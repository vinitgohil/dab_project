# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 2ccd4e31-ef08-4481-ba73-1feb749975fd

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: "citibike_dev"
    description: The catalog to use
  schema:
    description: The schema to use
  dev_flag: 
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405615103462605.5.azuredatabricks.net
    variables:
      catalog:
        default: "citibike_dev"
      schema: dev

  test:
    mode: production
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405614259537054.14.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/vgohil@mac.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog:
        default: "citibike_test"
      dev_flag:
        default: false
      schema: qa
    permissions:
      - service_principal_name: 39a427f8-676f-405a-a3e6-4f6959c6bcd5
        level: CAN_MANAGE
    run_as:
      service_principal_name: 39a427f8-676f-405a-a3e6-4f6959c6bcd5
