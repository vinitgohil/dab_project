resources:
  pipelines:
    pipeline_citibike_etl_pipeline:
      name: citibike_etl_pipeline
      configuration:
        catalog: "${var.catalog}"
      libraries:
        - notebook:
            path: ../citibike_etl/dlt/01_bronze/01_bronze_dlt_citibike.ipynb
        - notebook:
            path: ../citibike_etl/dlt/02_silver/02_silver_dlt_citibike.ipynb
        - notebook:
            path: ../citibike_etl/dlt/03_gold/03_gold_dlt_citibike_daily_ride_summary.ipynb
        - notebook:
            path: ../citibike_etl/dlt/03_gold/03_gold_dlt_citibike_daily_station_performance.ipynb
      schema: default
      continuous: false
      development: "${var.dev_flag}"
